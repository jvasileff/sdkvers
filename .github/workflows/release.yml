name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches Cargo.toml version
        run: |
          cargo_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "error: Cargo.toml version ($cargo_version) does not match tag ($tag_version)"
            exit 1
          fi

  build:
    needs: [validate]
    uses: ./.github/workflows/ci.yml

  release:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: sdkvers-dist
          path: dist/

      - name: Package
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir "sdkvers-${version}"
          cp dist/* "sdkvers-${version}/"
          tar czf "sdkvers.tar.gz" "sdkvers-${version}/"

      - uses: actions/upload-artifact@v7
        with:
          name: sdkvers-dist
          path: sdkvers.tar.gz

      - name: Create release
        run: |
          gh release create "${{ github.ref_name }}" sdkvers.tar.gz \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
