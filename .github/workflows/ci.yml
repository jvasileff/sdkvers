name: CI

on:
  push:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install just
        run: sudo apt-get install -y just

      - name: Install cross
        run: cargo install cross@0.2.5

      - name: Cache cross Docker images
        id: cache-cross-images
        uses: actions/cache@v5
        with:
          path: /tmp/cross-images
          key: cross-docker-images-0.2.5

      - name: Load cross Docker images
        if: steps.cache-cross-images.outputs.cache-hit == 'true'
        run: |
          for f in /tmp/cross-images/*.tar; do docker load -i "$f"; done

      - name: Run tests
        run: just test

      - name: Build Linux binaries
        run: just dist-linux

      - name: Save cross Docker images
        if: steps.cache-cross-images.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/cross-images
          docker save ghcr.io/cross-rs/aarch64-unknown-linux-musl:0.2.5   -o /tmp/cross-images/aarch64-unknown-linux-musl.tar
          docker save ghcr.io/cross-rs/x86_64-unknown-linux-musl:0.2.5    -o /tmp/cross-images/x86_64-unknown-linux-musl.tar
          docker save ghcr.io/cross-rs/arm-unknown-linux-musleabihf:0.2.5  -o /tmp/cross-images/arm-unknown-linux-musleabihf.tar
          docker save ghcr.io/cross-rs/armv7-unknown-linux-musleabihf:0.2.5 -o /tmp/cross-images/armv7-unknown-linux-musleabihf.tar

      - uses: actions/upload-artifact@v7
        with:
          name: linux-binaries
          path: dist/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install just
        run: brew install just

      - name: Run tests
        run: just test

      - name: Build macOS binaries
        run: just dist-macos

      - uses: actions/upload-artifact@v7
        with:
          name: macos-binaries
          path: dist/

  combine:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        run: sudo apt-get install -y just

      - uses: actions/download-artifact@v8
        with:
          name: linux-binaries
          path: dist/

      - uses: actions/download-artifact@v8
        with:
          name: macos-binaries
          path: dist/

      - name: Restore executable permissions
        run: chmod +x dist/sdkvers-resolve-*

      - name: Add shell scripts
        run: just _dist-scripts

      - uses: actions/upload-artifact@v7
        with:
          name: sdkvers-dist
          path: dist/
