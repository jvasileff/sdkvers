name: CI

on:
  push:
    branches: [master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install just
        run: sudo apt-get install -y just

      - name: Install cross
        run: cargo install cross@0.2.5

      - name: Run tests
        run: just test

      - name: Build Linux binaries
        run: just dist-linux

      - uses: actions/upload-artifact@v7
        with:
          name: linux-binaries
          path: dist/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install just
        run: brew install just

      - name: Run tests
        run: just test

      - name: Build macOS binaries
        run: just dist-macos

      - uses: actions/upload-artifact@v7
        with:
          name: macos-binaries
          path: dist/

  combine:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos]
    steps:
      - uses: actions/checkout@v6

      - name: Install just
        run: sudo apt-get install -y just

      - uses: actions/download-artifact@v8
        with:
          name: linux-binaries
          path: dist/

      - uses: actions/download-artifact@v8
        with:
          name: macos-binaries
          path: dist/

      - name: Restore executable permissions
        run: chmod +x dist/sdkvers-resolve-*

      - name: Add shell scripts
        run: just _dist-scripts

      - uses: actions/upload-artifact@v7
        with:
          name: sdkvers-dist
          path: dist/
